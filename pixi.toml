[workspace]
authors = ["Kiernan Beresford <beresford.kiernan@gmail.com>"]
channels = ["conda-forge"]
name = "nmr2selfies"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
"train" = {cmd = ""}

[dependencies]
python = ">=3.13,<3.14"
numpy = ">=2.4.3,<3"
rdkit = ">=2026.3.2,<2027"

[pypi-dependencies]
torch = { version = ">=2.5", index = "https://download.pytorch.org/whl/cu124" }
lightning = ">=2.6.1, <3"
pydantic-settings = ">=2.14.0, <3"
wandb = ">=0.26.1, <0.27"
selfies = ">=2.2.0, <3"
lmdb = ">=2.2.0, <3"
sympy = "==1.13.1"
pyarrow = ">=24.0.0, <25"

[feature.dev]

[environments]
default = { features = [], solve-group = "default" }
dev = { features = ["dev"], solve-group = "default" }
