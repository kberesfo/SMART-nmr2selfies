# LightningCLI YAML config. Override any field with --key value on the CLI.
# Example:
#   pixi run train --trainer.max_epochs 30 --model.lr 1e-4

seed_everything: 42

trainer:
  max_epochs: 20
  precision: bf16-mixed       # if your GPU supports bf16; else use 16-mixed
  accelerator: auto
  devices: auto
  gradient_clip_val: 1.0
  log_every_n_steps: 50
  val_check_interval: 0.25    # validate 4x per epoch -- early signal on long runs
  accumulate_grad_batches: 1
  deterministic: false        # true would slow training significantly

  logger:
    class_path: lightning.pytorch.loggers.WandbLogger
    init_args:
      project: nmr2selfies
      name: base-run
      log_model: false        # set true if you want W&B to upload checkpoints
      save_dir: wandb_logs

  callbacks:
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        dirpath: checkpoints
        filename: "epoch{epoch:02d}-val_loss{val/loss:.3f}"
        auto_insert_metric_name: false
        monitor: val/loss
        mode: min
        save_top_k: 3
        save_last: true
    - class_path: lightning.pytorch.callbacks.LearningRateMonitor
      init_args:
        logging_interval: step
    - class_path: lightning.pytorch.callbacks.EarlyStopping
      init_args:
        monitor: val/loss
        mode: min
        patience: 5
        min_delta: 0.001

model:
  class_path: nmr2selfies.NMRLightningModule
  init_args:
    d_model: 256
    n_heads: 8
    d_ff: 1024
    n_encoder_layers: 4
    n_decoder_layers: 4
    dropout: 0.1
    max_token_len: 128
    lr: 3.0e-4
    weight_decay: 0.01
    warmup_steps: 2000
    label_smoothing: 0.1
    tokenizer_path: tokenizer.json

data:
  class_path: nmr2selfies.NMRDataModule
  init_args:
    train_path: data/train.parquet
    val_path: data/val.parquet
    tokenizer_path: tokenizer.json
    batch_size: 128
    num_workers: 4
